services:
  - type: worker
    name: bot-keuangan-lolila
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CREDS_JSON
        sync: false
      - key: OWNER_ID
        sync: false
      - key: TIMEZONE
        value: Asia/Jakarta
      - key: JAM_LAPORAN
        value: "21"
